<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Roleta </title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: #fff;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    h1 {
      margin-top: 20px;
      color: #ffd700;
    }
    .roleta {
      margin: 40px auto;
      width: 300px;
      height: 300px;
      border: 10px solid #ffd700;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
    }
    .numeros {
      width: 100%;
      height: 100%;
      position: absolute;
      transform: rotate(0deg);
      transition: transform 5s cubic-bezier(0.17, 0.67, 0.83, 0.67);
    }
    .numero {
      position: absolute;
      width: 50%;
      height: 50%;
      left: 50%;
      top: 50%;
      transform-origin: 0% 0%;
      color: #fff;
      font-size: 10px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      background: #ffd700;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #e6c200;
    }
    .resultado {
      margin-top: 20px;
      font-size: 20px;
      color: #00ff00;
    }
    .aviso {
      margin-top: 30px;
      font-size: 14px;
      color: #ff4444;
    }
  </style>
</head>
<body>
  <h1>Roleta </h1>
  <div class="roleta">
    <div class="numeros" id="numeros"></div>
  </div>
  <button onclick="girar()">Girar</button>
  <div class="resultado" id="resultado"></div>
  <div class="aviso">
    Resudo é 14.<br>
  </div>

  <audio id="som" src="https://www.soundjay.com/mechanical/sounds/mechanical-spin-01.mp3"></audio>

  <script>
    const numerosDiv = document.getElementById('numeros');
    const resultadoDiv = document.getElementById('resultado');
    const som = document.getElementById('som');

    // Criar números de 1 a 100
    for (let i = 1; i <= 100; i++) {
      const num = document.createElement('div');
      num.className = 'numero';
      const angle = (i - 1) * (360 / 100);
      num.style.transform = `rotate(${angle}deg) translate(120px)`;
      num.textContent = i;
      numerosDiv.appendChild(num);
    }

    function girar() {
      som.play();
      // Gira várias voltas mas sempre para no 14
      const voltas = Math.floor(Math.random() * 5) + 5; // entre 5 e 10 voltas
      const anguloPorNumero = 360 / 100;
      const alvo = 14;
      const anguloFinal = voltas * 360 - (alvo - 1) * anguloPorNumero;
      numerosDiv.style.transform = `rotate(${anguloFinal}deg)`;
      setTimeout(() => {
        resultadoDiv.textContent = "Resultado: 14";
      }, 5000);
    }
  </script>
</body>
</html>
